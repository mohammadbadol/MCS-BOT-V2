<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAGOR BOT — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #020408;
  --cyan: #00f5ff;
  --pink: #ff2d78;
  --green: #39ff14;
  --card: rgba(0,245,255,0.04);
  --border: rgba(0,245,255,0.15);
  --text: #c8e8ec;
  --muted: #4a7a82;
}
body {
  background: var(--bg);
  font-family: 'Share Tech Mono', monospace;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* Animated grid background */
.bg-grid {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,245,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,245,255,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  animation: gridMove 20s linear infinite;
}
@keyframes gridMove { from{transform:translateY(0)} to{transform:translateY(40px)} }

/* Scan line effect */
.scanlines {
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.15) 2px,
    rgba(0,0,0,0.15) 4px
  );
  pointer-events: none;
  z-index: 999;
}

/* Corner decorations */
.corner { position: fixed; width: 60px; height: 60px; }
.corner::before, .corner::after { content: ''; position: absolute; background: var(--cyan); }
.corner::before { width: 100%; height: 2px; top: 0; }
.corner::after { width: 2px; height: 100%; top: 0; }
.corner.tl { top: 20px; left: 20px; }
.corner.tr { top: 20px; right: 20px; transform: scaleX(-1); }
.corner.bl { bottom: 20px; left: 20px; transform: scaleY(-1); }
.corner.br { bottom: 20px; right: 20px; transform: scale(-1); }

/* Glow orbs */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.12;
  animation: orbFloat 8s ease-in-out infinite;
}
.orb1 { width: 400px; height: 400px; background: var(--cyan); top: -100px; left: -100px; animation-delay: 0s; }
.orb2 { width: 300px; height: 300px; background: var(--pink); bottom: -80px; right: -80px; animation-delay: 3s; }
@keyframes orbFloat { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,20px)} }

/* Main login card */
.login-wrap {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 420px;
  padding: 16px;
}

.login-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 48px 40px 40px;
  backdrop-filter: blur(20px);
  position: relative;
  overflow: hidden;
}

/* Card corner brackets */
.login-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--cyan), transparent);
  animation: scanH 3s ease-in-out infinite;
}
@keyframes scanH { 0%,100%{opacity:0.3} 50%{opacity:1} }

/* Logo area */
.logo-area {
  text-align: center;
  margin-bottom: 40px;
}
.logo-icon {
  width: 72px; height: 72px;
  border: 2px solid var(--cyan);
  border-radius: 50%;
  margin: 0 auto 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  position: relative;
  background: rgba(0,245,255,0.05);
  animation: logoPulse 2s ease-in-out infinite;
}
@keyframes logoPulse {
  0%,100%{ box-shadow: 0 0 20px rgba(0,245,255,0.3); }
  50%{ box-shadow: 0 0 40px rgba(0,245,255,0.6), 0 0 80px rgba(0,245,255,0.2); }
}
.logo-icon::after {
  content: '';
  position: absolute;
  inset: -6px;
  border: 1px solid rgba(0,245,255,0.2);
  border-radius: 50%;
  animation: rotateBorder 4s linear infinite;
}
@keyframes rotateBorder { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

.logo-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 22px;
  font-weight: 900;
  color: var(--cyan);
  letter-spacing: 4px;
  text-shadow: 0 0 20px rgba(0,245,255,0.5);
  margin-bottom: 4px;
}
.logo-sub {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 3px;
  text-transform: uppercase;
}

/* System label */
.sys-label {
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 6px;
  display: block;
}

/* Input groups */
.input-group {
  margin-bottom: 20px;
}
.input-wrapper {
  position: relative;
  display: flex;
  align-items: center;
}
.input-icon {
  position: absolute;
  left: 14px;
  color: var(--muted);
  font-size: 14px;
  pointer-events: none;
  transition: color 0.2s;
}
.input-wrapper:focus-within .input-icon { color: var(--cyan); }

input[type="text"], input[type="password"] {
  width: 100%;
  background: rgba(0,245,255,0.03);
  border: 1px solid rgba(0,245,255,0.15);
  border-radius: 3px;
  color: var(--text);
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  padding: 12px 14px 12px 38px;
  outline: none;
  transition: all 0.2s;
  letter-spacing: 1px;
}
input[type="text"]:focus, input[type="password"]:focus {
  border-color: var(--cyan);
  background: rgba(0,245,255,0.06);
  box-shadow: 0 0 0 2px rgba(0,245,255,0.08), inset 0 0 20px rgba(0,245,255,0.03);
}
input::placeholder { color: var(--muted); font-size: 11px; letter-spacing: 2px; }

/* Login button */
.login-btn {
  width: 100%;
  background: transparent;
  border: 1px solid var(--cyan);
  color: var(--cyan);
  font-family: 'Orbitron', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 4px;
  padding: 14px;
  border-radius: 3px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: all 0.3s;
  text-transform: uppercase;
  margin-top: 8px;
}
.login-btn::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(0,245,255,0.15), transparent);
  transition: left 0.5s;
}
.login-btn:hover::before { left: 100%; }
.login-btn:hover {
  background: rgba(0,245,255,0.08);
  box-shadow: 0 0 25px rgba(0,245,255,0.3);
  text-shadow: 0 0 10px var(--cyan);
}
.login-btn:active { transform: scale(0.98); }

/* Error message */
.error-msg {
  background: rgba(255,45,120,0.1);
  border: 1px solid rgba(255,45,120,0.3);
  color: var(--pink);
  border-radius: 3px;
  padding: 10px 14px;
  font-size: 11px;
  letter-spacing: 1px;
  margin-top: 16px;
  display: none;
}
.error-msg.show { display: block; animation: shake 0.3s ease; }
@keyframes shake {
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-6px)}
  75%{transform:translateX(6px)}
}

/* Status bar at bottom */
.status-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 32px;
  padding-top: 20px;
  border-top: 1px solid rgba(0,245,255,0.08);
}
.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  display: inline-block;
  margin-right: 6px;
  animation: blink 1.5s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.status-txt { font-size: 10px; color: var(--muted); letter-spacing: 1px; }
.version-txt { font-size: 10px; color: rgba(0,245,255,0.3); letter-spacing: 1px; }

/* Loading overlay */
.loading-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(2,4,8,0.9);
  z-index: 9999;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
}
.loading-overlay.show { display: flex; }
.loader-ring {
  width: 50px; height: 50px;
  border: 2px solid rgba(0,245,255,0.1);
  border-top-color: var(--cyan);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loader-txt { font-size: 11px; color: var(--cyan); letter-spacing: 3px; }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="scanlines"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loader-ring"></div>
  <div class="loader-txt">AUTHENTICATING...</div>
</div>

<div class="login-wrap">
  <div class="login-card">
    <div class="logo-area">
      <div class="logo-icon">🤖</div>
      <div class="logo-title">SAGOR BOT</div>
      <div class="logo-sub">Control Panel v2.0</div>
    </div>

    <div class="input-group">
      <span class="sys-label">// Username</span>
      <div class="input-wrapper">
        <span class="input-icon">👤</span>
        <input type="text" id="username" placeholder="ENTER USERNAME" autocomplete="off" spellcheck="false">
      </div>
    </div>

    <div class="input-group">
      <span class="sys-label">// Password</span>
      <div class="input-wrapper">
        <span class="input-icon">🔒</span>
        <input type="password" id="password" placeholder="ENTER PASSWORD" autocomplete="off">
      </div>
    </div>

    <button class="login-btn" onclick="doLogin()">⚡ ACCESS SYSTEM</button>

    <div class="error-msg" id="errorMsg">⛔ ACCESS DENIED — Invalid credentials</div>

    <div class="status-bar">
      <div><span class="status-dot"></span><span class="status-txt">SYSTEM ONLINE</span></div>
      <div class="version-txt">SAGOR-BOT v5.0.0</div>
    </div>
  </div>
</div>

<script>
const USERS = { sagorbot: '123456' };

function doLogin() {
  const user = document.getElementById('username').value.trim();
  const pass = document.getElementById('password').value;
  const errEl = document.getElementById('errorMsg');
  errEl.classList.remove('show');

  if (!user || !pass) {
    errEl.textContent = '⚠️ Please enter both username and password';
    errEl.classList.add('show');
    return;
  }

  if (USERS[user] && USERS[user] === pass) {
    document.getElementById('loadingOverlay').classList.add('show');
    sessionStorage.setItem('sagor_auth', btoa(user + ':' + Date.now()));
    setTimeout(() => { window.location.href = '/'; }, 1500);
  } else {
    errEl.textContent = '⛔ ACCESS DENIED — Invalid credentials';
    errEl.classList.add('show');
    document.getElementById('password').value = '';
  }
}

// Enter key support
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// Check if already logged in
if (sessionStorage.getItem('sagor_auth')) {
  window.location.href = '/';
}
</script>
</body>
</html>
